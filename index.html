<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Card Game</title>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const script = document.createElement('script');
            script.src = 'https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js';
            script.onload = initGame;
            document.head.appendChild(script);
            
            // Preload fonts
            const link = document.createElement('link');
            link.href = 'https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap';
            link.rel = 'stylesheet';
            document.head.appendChild(link);
        });
    </script>
    <style>
        body {
            background-color: #fba8ad;
            margin: 0;
            padding: 20px;
            font-family: 'Comic Neue', cursive;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            color: #7d1339;
            text-align: center;
            margin: 10px auto;
            font-weight: 700;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 20px;
            margin: 20px 0;
            width: 100%;
            max-width: 800px;
        }
        .card {
            width: 100px;
            height: 100px;
            background-color: #eb6d82;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            transform-style: preserve-3d;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card-content {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }
        .card-back {
            background-color: #eb6d82;
            color: #fff;
            font-size: 24px;
        }
        .card-front {
            background-color: #fff;
            color: #000;
            transform: rotateY(180deg);
            font-size: 14px;
            padding: 5px;
            text-align: center;
            word-break: break-word;
        }
        .card-front.chinese {
            font-weight: bold;
            font-family: 'Comic Neue', cursive;
            letter-spacing: 0.5px;
        }
        .button-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            border: none;
            background-color: #7d1339;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Comic Neue', cursive;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #6a1133;
        }
        #success-message {
            margin-top: 20px;
            display: none;
            font-size: 24px;
            color: #7d1339;
            font-weight: bold;
            text-align: center;
        }
        #timer {
            margin-top: 10px;
            font-size: 18px;
            color: #7d1339;
            font-weight: bold;
        }
        .input-container {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }
        #error-message {
            color: red;
            margin-top: 10px;
            display: none;
            font-weight: bold;
            text-align: center;
        }
        .upload-btn-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .upload-btn {
            padding: 10px 20px;
            border: none;
            background-color: #7d1339;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            font-family: 'Comic Neue', cursive;
        }
        .upload-btn-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Memory Card Game</h1>
    <div class="input-container" id="input-container">
        <div class="upload-btn-wrapper">
            <button class="upload-btn">Upload Excel File</button>
            <input type="file" id="excel-upload" accept=".xlsx, .xls" />
        </div>
        <button id="generate-game">Generate Game</button>
        <div id="error-message">No valid word pairs found. Please check your Excel file.</div>
    </div>
    <div class="button-container">
        <button id="deal-button">Deal Cards</button>
        <button id="start-button">Start Game</button>
    </div>
    <div class="container" id="card-container"></div>
    <div id="success-message">🎆 Congratulations! You Win! 🎆</div>
    <div id="timer">Time: 0 seconds</div>

    <script>
        let wordPairs = [];
        let timer = 0;
        let timerInterval = null;
        let matchedCards = 0;
        let flippedCards = [];
        let isFlipping = false;

        function initGame() {
            document.getElementById('generate-game').addEventListener('click', handleExcelUpload);
            document.getElementById('deal-button').addEventListener('click', resetGame);
            document.getElementById('start-button').addEventListener('click', startGame);
            
            // Show filename when selected
            document.getElementById('excel-upload').addEventListener('change', function() {
                const fileName = this.files[0] ? this.files[0].name : 'No file selected';
                document.querySelector('.upload-btn').textContent = fileName.length > 20 ? 
                    fileName.substring(0, 17) + '...' : fileName;
            });
        }

        function handleExcelUpload() {
            const fileInput = document.getElementById('excel-upload');
            const file = fileInput.files[0];
            if (!file) {
                showError("Please upload an Excel file.");
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    const jsonData = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                    wordPairs = [];
                    jsonData.forEach(row => {
                        if (row.length >= 2 && row[0] && row[1]) {
                            wordPairs.push({
                                english: String(row[0]).trim(),
                                chinese: String(row[1]).trim(),
                                pairId: wordPairs.length
                            });
                        }
                    });

                    if (wordPairs.length < 1) {
                        showError("No valid word pairs found. Ensure Excel has English (Column A) and Chinese (Column B).");
                        return;
                    }
                    if (wordPairs.length > 18) {
                        showError("Maximum 18 word pairs allowed.");
                        return;
                    }

                    hideError();
                    initCards();
                } catch (error) {
                    showError("Error reading Excel file. Please try again.");
                    console.error(error);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function showError(message) {
            const errorElement = document.getElementById('error-message');
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        function initCards() {
            const container = document.getElementById('card-container');
            container.innerHTML = '';

            const cards = [];
            wordPairs.forEach(pair => {
                cards.push({ 
                    content: pair.english, 
                    pairId: pair.pairId,
                    isChinese: false
                });
                cards.push({ 
                    content: pair.chinese, 
                    pairId: pair.pairId,
                    isChinese: true
                });
            });

            shuffleArray(cards);
            cards.forEach((cardData, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.pairId = cardData.pairId;

                const cardBack = document.createElement('div');
                cardBack.className = 'card-content card-back';
                cardBack.textContent = '🐾';

                const cardFront = document.createElement('div');
                cardFront.className = 'card-content card-front';
                if (cardData.isChinese) {
                    cardFront.classList.add('chinese');
                }
                cardFront.textContent = cardData.content;

                card.appendChild(cardBack);
                card.appendChild(cardFront);
                card.addEventListener('click', handleCardClick);
                container.appendChild(card);
            });

            // Initially show cards face-up
            document.querySelectorAll('.card').forEach(card => card.classList.add('flipped'));
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function handleCardClick(e) {
            if (isFlipping) return;

            const card = e.target.closest('.card');
            if (!card || card.classList.contains('flipped') || flippedCards.includes(card)) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                isFlipping = true;
                checkMatch(flippedCards[0], flippedCards[1]);
            }
        }

        function checkMatch(card1, card2) {
            const pairId1 = card1.dataset.pairId;
            const pairId2 = card2.dataset.pairId;

            if (pairId1 === pairId2) {
                matchedCards += 2;
                flippedCards = [];
                isFlipping = false;
                checkWin();
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isFlipping = false;
                }, 1000);
            }
        }

        function checkWin() {
            if (matchedCards === wordPairs.length * 2) {
                clearInterval(timerInterval);
                document.getElementById('success-message').style.display = 'block';
                document.querySelectorAll('.card').forEach(card => card.style.pointerEvents = 'none');
            }
        }

        function resetGame() {
            if (wordPairs.length === 0) {
                showError("Please upload an Excel file first.");
                return;
            }
            initCards();
            document.getElementById('success-message').style.display = 'none';
            matchedCards = 0;
            clearInterval(timerInterval);
            timer = 0;
            document.getElementById('timer').textContent = 'Time: 0 seconds';
        }

        function startGame() {
            if (wordPairs.length === 0) {
                showError("Please upload an Excel file first.");
                return;
            }
            document.querySelectorAll('.card').forEach(card => {
                card.style.pointerEvents = 'auto';
                card.classList.remove('flipped');
            });
            startTimer();
        }

        function startTimer() {
            timer = 0;
            timerInterval = setInterval(() => {
                timer++;
                document.getElementById('timer').textContent = `Time: ${timer} seconds`;
            }, 1000);
        }
    </script>
</body>
</html>
